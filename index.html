<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>순서도 메이커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shape-text {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-all;
            padding: 8px;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
        }
        /* 문서 도형 하단 곡선 스타일링 보강 */
        .shape-document {
            border-bottom-left-radius: 12px 20px;
            border-bottom-right-radius: 60px 20px;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Flowchart Maker</h1>
        </div>
        
        <div class="flex items-center space-x-3">
            <button id="btn-new" class="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white font-medium rounded-lg shadow-sm transition">
                새로 만들기
            </button>
            <label id="btn-load-label" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg shadow-sm transition cursor-pointer">
                <span>배경으로 불러오기</span>
                <input type="file" id="btn-load" accept="image/*" class="hidden">
            </label>
            <button id="btn-save" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-sm transition">
                이미지로 저장하기
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-64 bg-white border-r border-slate-200 p-6 flex flex-col space-y-6 shrink-0">
            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">순서도 도형 선택</h2>
                <div class="space-y-3" id="shape-selectors">
                    <button data-shape="oval" class="w-full p-3 border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 rounded-xl transition flex items-center space-x-3 text-left group">
                        <div class="w-12 h-7 border-2 border-slate-700 rounded-full bg-slate-50 group-hover:bg-white shrink-0"></div>
                        <span class="text-sm font-medium text-slate-700">시작 / 종료</span>
                    </button>
                    <button data-shape="rectangle" class="w-full p-3 border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 rounded-xl transition flex items-center space-x-3 text-left group">
                        <div class="w-12 h-7 border-2 border-slate-700 bg-slate-50 group-hover:bg-white shrink-0"></div>
                        <span class="text-sm font-medium text-slate-700">처리 (사각형)</span>
                    </button>
                    <button data-shape="diamond" class="w-full p-3 border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 rounded-xl transition flex items-center space-x-3 text-left group">
                        <div class="w-7 h-7 border-2 border-slate-700 bg-slate-50 group-hover:bg-white rotate-45 transform origin-center mx-2 shrink-0"></div>
                        <span class="text-sm font-medium text-slate-700">조건 (마름모)</span>
                    </button>
                    <button data-shape="document" class="w-full p-3 border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/50 rounded-xl transition flex items-center space-x-3 text-left group">
                        <div class="w-12 h-7 border-2 border-slate-700 bg-slate-50 group-hover:bg-white shrink-0 shape-document"></div>
                        <span class="text-sm font-medium text-slate-700">문서</span>
                    </button>
                </div>
            </div>
            <div class="text-xs text-slate-400 bg-slate-50 p-3 rounded-lg border border-slate-100">
                <p class="font-semibold mb-1">💡 사용 안내</p>
                <p>도형을 누르고 내용을 입력하면 마우스를 따라 반투명 창이 이동합니다. 작업판 위 원하는 곳을 클릭해 고정하세요.</p>
            </div>
        </aside>

        <main class="flex-1 bg-slate-200 p-8 overflow-auto flex items-start justify-start relative select-none">
            <div id="canvas" class="w-[1200px] h-[800px] bg-white rounded-xl shadow-md relative overflow-hidden bg-cover bg-center border border-slate-300 shrink-0">
                
                <svg id="arrow-layer" class="absolute inset-0 w-full h-full pointer-events-none z-10">
                    <defs>
                        <marker id="head" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
                        </marker>
                    </defs>
                </svg>

                <div id="shape-layer" class="absolute inset-0 z-20
